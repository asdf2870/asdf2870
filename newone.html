<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        body {
            font-family: 'Quicksand', 'Noto Sans TC', sans-serif;
            background-color: #fff8f3;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bouncy-press:active {
            transform: scale(0.95) translateY(1px);
        }
        .soft-shadow {
            box-shadow: 0 4px 20px rgba(93, 87, 79, 0.08);
        }
        .modal-backdrop {
            backdrop-filter: blur(4px);
            background-color: rgba(31, 27, 21, 0.4);
        }
        [x-cloak] { display: none !important; }
        
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-pop {
            animation: fadeInScale 0.2s ease-out forwards;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#436738",
                        "primary-container": "#98c189",
                        "on-primary": "#ffffff",
                        "surface": "#fff8f3",
                        "surface-container": "#f6ece2",
                        "surface-container-low": "#fcf2e7",
                        "on-surface": "#1f1b15",
                        "on-surface-variant": "#43493f",
                        "outline": "#73796e",
                        "outline-variant": "#c3c8bc",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "tertiary": "#625e50",
                        "tertiary-container": "#bcb6a4",
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "full": "9999px"
                    }
                }
            }
        }
    </script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-surface min-h-screen pb-32" x-data="{ 
    members: [
        { id: 1, name: '青霞仙子', level: '初級', remarks: '擅長清一色', editing: false },
        { id: 2, name: '紫霞仙子', level: '中級', remarks: '固定週六上線', editing: false },
        { id: 3, name: '盤絲大仙', level: '高級', remarks: '大三元專家', editing: false }
    ],
    showDeleteModal: false,
    memberToDelete: null,
    
    addMember() {
        const id = Date.now();
        this.members.push({ id: id, name: '', level: '初級', remarks: '', editing: true });
    },
    
    confirmDelete(id) {
        this.memberToDelete = id;
        this.showDeleteModal = true;
    },
    
    executeDelete() {
        this.members = this.members.filter(m => m.id !== this.memberToDelete);
        this.showDeleteModal = false;
        this.memberToDelete = null;
    }
}">

    <header class="fixed top-0 left-1/2 -translate-x-1/2 w-full z-40 flex justify-between items-center px-6 h-16 max-w-[600px] bg-surface/80 backdrop-blur-md border-b border-outline-variant/20">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-primary cursor-pointer active:scale-90 transition-transform">arrow_back</span>
            <h1 class="text-xl font-bold text-primary">仙班名冊管理</h1>
        </div>
        <div class="bg-primary/10 text-primary px-3 py-1 rounded-full text-xs font-bold">
            共 <span x-text="members.length"></span> 位
        </div>
    </header>

    <main class="max-w-[600px] mx-auto pt-24 px-6">
        <div class="space-y-4">
            <template x-for="(member, index) in members" :key="member.id">
                <div 
                    class="relative bg-white p-5 rounded-2xl soft-shadow transition-all duration-300 border-2"
                    :class="member.editing ? 'border-primary' : 'border-transparent hover:border-primary/20'"
                >
                    <!-- 顯示狀態 (預設) -->
                    <div class="flex items-center justify-between" x-show="!member.editing" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-primary-container/20 text-primary rounded-full flex items-center justify-center font-bold text-lg">
                                <span x-text="member.name ? member.name.charAt(0) : '?'"></span>
                            </div>
                            <div>
                                <div class="flex items-center gap-2">
                                    <h4 class="font-bold text-on-surface text-lg" x-text="member.name || '未命名仙友'"></h4>
                                    <span class="px-2 py-0.5 bg-tertiary-container/30 text-tertiary text-[10px] rounded-full font-bold" x-text="member.level"></span>
                                </div>
                                <p class="text-sm text-outline mt-0.5" x-text="member.remarks || '暫無備註'"></p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button @click="member.editing = true" class="w-9 h-9 rounded-full flex items-center justify-center bg-primary/5 text-primary bouncy-press hover:bg-primary/10 transition-colors">
                                <span class="material-symbols-outlined text-[20px]">edit</span>
                            </button>
                            <button @click="confirmDelete(member.id)" class="w-9 h-9 rounded-full flex items-center justify-center bg-error/5 text-error bouncy-press hover:bg-error/10 transition-colors">
                                <span class="material-symbols-outlined text-[20px]">delete</span>
                            </button>
                        </div>
                    </div>

                    <!-- 編輯狀態 (按下編輯後出現) -->
                    <div class="space-y-4" x-show="member.editing" x-cloak x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100">
                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1">
                                <label class="text-[11px] font-bold text-primary ml-1">仙號</label>
                                <input class="w-full bg-surface-container border-none rounded-xl p-2.5 text-on-surface focus:ring-2 focus:ring-primary text-sm" type="text" x-model="member.name" placeholder="請輸入名稱"/>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[11px] font-bold text-primary ml-1">等級</label>
                                <select class="w-full bg-surface-container border-none rounded-xl p-2.5 text-on-surface focus:ring-2 focus:ring-primary text-sm" x-model="member.level">
                                    <option>初級</option>
                                    <option>中級</option>
                                    <option>高級</option>
                                </select>
                            </div>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[11px] font-bold text-primary ml-1">備註</label>
                            <input class="w-full bg-surface-container border-none rounded-xl p-2.5 text-on-surface focus:ring-2 focus:ring-primary text-sm" placeholder="請輸入備註內容..." type="text" x-model="member.remarks"/>
                        </div>
                        <div class="flex justify-end gap-3 pt-3 border-t border-outline-variant/10">
                            <button @click="member.editing = false" class="px-4 py-2 text-outline text-sm font-bold bouncy-press">取消</button>
                            <button @click="member.editing = false" class="px-6 py-2 bg-primary text-on-primary rounded-full text-sm font-bold soft-shadow bouncy-press">儲存修改</button>
                        </div>
                    </div>
                </div>
            </template>

            <!-- 新增按鈕 -->
            <button @click="addMember()" class="w-full mt-6 py-4 border-2 border-dashed border-primary-container/60 rounded-2xl flex items-center justify-center gap-2 text-primary font-bold hover:bg-primary/5 transition-colors bouncy-press">
                <span class="material-symbols-outlined">person_add</span>
                <span>新增仙班成員</span>
            </button>
        </div>
    </main>

    <div 
        class="fixed inset-0 z-[100] flex items-center justify-center p-6 modal-backdrop"
        x-show="showDeleteModal"
        x-cloak
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100"
    >
        <div 
            class="bg-white w-full max-w-[320px] rounded-3xl p-8 soft-shadow animate-pop"
            @click.away="showDeleteModal = false"
        >
            <div class="text-center">
                <div class="w-16 h-16 bg-error-container text-error rounded-full flex items-center justify-center mx-auto mb-4">
                    <span class="material-symbols-outlined text-[32px]">warning</span>
                </div>
                <h3 class="text-xl font-bold text-on-surface mb-2">確認剔除仙班？</h3>
                <p class="text-on-surface-variant text-sm leading-relaxed mb-8">
                    此操作將會把該仙友從名冊中永久移除，確認要執行嗎？
                </p>
                <div class="flex flex-col gap-2">
                    <button 
                        @click="executeDelete()" 
                        class="w-full py-3 bg-error text-on-primary rounded-full font-bold bouncy-press"
                    >
                        確認刪除
                    </button>
                    <button 
                        @click="showDeleteModal = false" 
                        class="w-full py-3 bg-surface-container text-on-surface-variant rounded-full font-bold bouncy-press"
                    >
                        我再想想
                    </button>
                </div>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full z-40 flex justify-around items-center px-4 pb-8 pt-3 h-20 max-w-[600px] bg-white shadow-[0_-4px_20px_rgba(0,0,0,0.05)] rounded-t-[2.5rem]">
        <div class="flex flex-col items-center justify-center text-outline/60 cursor-not-allowed">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="text-[10px] mt-1 font-bold">大廳</span>
        </div>
        <div class="flex flex-col items-center justify-center text-primary">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">edit_note</span>
            <span class="text-[10px] mt-1 font-bold">名冊管理</span>
        </div>
        <div class="flex flex-col items-center justify-center text-outline/60 cursor-not-allowed">
            <span class="material-symbols-outlined">leaderboard</span>
            <span class="text-[10px] mt-1 font-bold">數據</span>
        </div>
    </nav>

</body>
</html>
