<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        body {
            font-family: 'Quicksand', 'Noto Sans TC', sans-serif;
            background-color: #fff8f3;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bouncy-press:active {
            transform: scale(0.95) translateY(2px);
        }
        .soft-shadow {
            box-shadow: 0 4px 20px rgba(93, 87, 79, 0.08);
        }
        [x-cloak] { display: none !important; }
        
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-pop {
            animation: popIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        /* 自定義捲軸 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#436738",
                        "primary-container": "#98c189",
                        "on-primary": "#ffffff",
                        "surface": "#fff8f3",
                        "surface-container": "#f6ece2",
                        "surface-container-high": "#f0e7dc",
                        "surface-container-low": "#fcf2e7",
                        "on-surface": "#1f1b15",
                        "on-surface-variant": "#43493f",
                        "outline": "#73796e",
                        "outline-variant": "#c3c8bc",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "on-error": "#ffffff",
                        "tertiary": "#625e50",
                    }
                }
            }
        }
    </script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-surface min-h-screen pb-32" x-data="{
    activeTab: 'fortune',
    showDeleteModal: false,
    ruleToDelete: null,
    iconLibrary: [
        'auto_awesome', 'star', 'celebration', 'repeat', 'diamond', 'favorite', 
        'bolt', 'warning', 'heart_broken', 'gavel', 'skull', 'ac_unit', 
        'local_fire_department', 'pets', 'eco', 'rocket_launch', 'extension'
    ],
    rules: [
        { id: 1, category: 'fortune', name: '自摸大滿貫', points: '+100', units: '3', desc: '稀有事件', icon: 'repeat', editing: false },
        { id: 2, category: 'fortune', name: '連莊三巡', points: '+40', units: '1', desc: '常見事件', icon: 'star', editing: false },
        { id: 3, category: 'fortune', name: '天胡大喜', points: '+200', units: '8', desc: '史詩事件', icon: 'celebration', editing: false },
        { id: 4, category: 'tribulation', name: '放槍大失血', points: '-50', units: '1', desc: '痛失點數', icon: 'heart_broken', editing: false },
        { id: 5, category: 'tribulation', name: '包牌懲罰', points: '-100', units: '2', desc: '規矩必須守', icon: 'gavel', editing: false }
    ],
    
    get filteredRules() {
        return this.rules.filter(r => r.category === this.activeTab);
    },

    addRule() {
        const newId = Date.now();
        const icon = this.activeTab === 'fortune' ? 'auto_awesome' : 'bolt';
        this.rules.push({
            id: newId,
            category: this.activeTab,
            name: '',
            points: this.activeTab === 'fortune' ? '+0' : '-0',
            units: '0',
            desc: '',
            icon: icon,
            editing: true
        });
    },

    confirmDelete(id) {
        this.ruleToDelete = id;
        this.showDeleteModal = true;
    },

    executeDelete() {
        this.rules = this.rules.filter(r => r.id !== this.ruleToDelete);
        this.showDeleteModal = false;
        this.ruleToDelete = null;
    }
}">

    <header class="fixed top-0 left-1/2 -translate-x-1/2 w-full z-50 flex justify-between items-center px-6 h-16 max-w-[600px] bg-surface/90 backdrop-blur-md shadow-sm border-b border-outline-variant/10">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-primary cursor-pointer active:scale-90 transition-transform">arrow_back</span>
            <h1 class="text-xl font-bold text-primary">小仙女集合中心</h1>
        </div>
    </header>

    <main class="max-w-[600px] mx-auto pt-24 px-6">
        <div class="mb-8">
            <p class="text-xs font-bold text-primary tracking-widest uppercase mb-1">系統設定</p>
            <h2 class="text-3xl font-bold text-on-surface">特殊紀錄規則管理</h2>
        </div>

        <div class="bg-surface-container-low p-1.5 rounded-2xl flex gap-1 mb-8">
            <button 
                @click="activeTab = 'fortune'"
                class="flex-1 py-3 rounded-xl font-bold transition-all bouncy-press"
                :class="activeTab === 'fortune' ? 'bg-primary text-on-primary shadow-md' : 'text-outline hover:bg-surface-container-high'"
            >
                仙緣奇遇
            </button>
            <button 
                @click="activeTab = 'tribulation'"
                class="flex-1 py-3 rounded-xl font-bold transition-all bouncy-press"
                :class="activeTab === 'tribulation' ? 'bg-primary text-on-primary shadow-md' : 'text-outline hover:bg-surface-container-high'"
            >
                渡劫時刻
            </button>
        </div>

        <div class="space-y-4">
            <!-- 類別說明卡片 -->
            <div 
                class="p-5 rounded-2xl flex items-center gap-4 border-2 transition-colors duration-300"
                :class="activeTab === 'fortune' ? 'bg-primary-container/20 border-primary-container/30' : 'bg-error-container/20 border-error-container/30'"
            >
                <div class="w-12 h-12 rounded-xl flex items-center justify-center transition-colors"
                     :class="activeTab === 'fortune' ? 'bg-primary text-on-primary' : 'bg-error text-on-error'">
                    <span class="material-symbols-outlined text-3xl" x-text="activeTab === 'fortune' ? 'auto_awesome' : 'bolt'"></span>
                </div>
                <div>
                    <h3 class="font-bold text-lg text-on-surface" x-text="activeTab === 'fortune' ? '仙緣奇遇規則' : '渡劫時刻規則'"></h3>
                    <p class="text-sm text-on-surface-variant" x-text="activeTab === 'fortune' ? '此類別項目將於結算時增加玩家積分' : '此類別項目將於結算時扣除玩家積分'"></p>
                </div>
            </div>

            <div class="grid gap-4">
                <template x-for="rule in filteredRules" :key="rule.id">
                    <div 
                        class="bg-white border p-5 rounded-2xl soft-shadow transition-all duration-300"
                        :class="rule.editing ? 'border-primary ring-2 ring-primary/10' : 'border-outline-variant/30'"
                    >
                        <!-- 顯示狀態 -->
                        <div class="flex items-center justify-between" x-show="!rule.editing" x-transition>
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 bg-surface-container rounded-xl flex items-center justify-center text-primary">
                                    <span class="material-symbols-outlined text-2xl" x-text="rule.icon"></span>
                                </div>
                                <div>
                                    <h4 class="font-bold text-on-surface text-lg" x-text="rule.name || '未命名規則'"></h4>
                                    <div class="flex flex-wrap items-center gap-2 mt-0.5">
                                        <span class="font-bold px-2 py-0.5 rounded-md text-sm" 
                                              :class="activeTab === 'fortune' ? 'bg-primary/10 text-primary' : 'bg-error/10 text-error'"
                                              x-text="rule.points + ' P'"></span>
                                        <span class="flex items-center gap-1 font-bold px-2 py-0.5 rounded-md text-sm bg-tertiary/10 text-tertiary">
                                            <span class="material-symbols-outlined text-xs">filter_frames</span>
                                            <span x-text="rule.units + ' 台'"></span>
                                        </span>
                                        <span class="text-outline text-xs" x-text="'• ' + (rule.desc || '暫無描述')"></span>
                                    </div>
                                </div>
                            </div>
                            <div class="flex gap-1">
                                <button @click="rule.editing = true" class="w-10 h-10 rounded-full flex items-center justify-center text-primary hover:bg-primary/5 transition-colors bouncy-press">
                                    <span class="material-symbols-outlined text-[20px]">edit</span>
                                </button>
                                <button @click="confirmDelete(rule.id)" class="w-10 h-10 rounded-full flex items-center justify-center text-error hover:bg-error/5 transition-colors bouncy-press">
                                    <span class="material-symbols-outlined text-[20px]">delete</span>
                                </button>
                            </div>
                        </div>

                        <div class="space-y-4" x-show="rule.editing" x-cloak x-transition>
                            <div class="flex items-center justify-between mb-2">
                                <div class="flex items-center gap-2 text-primary">
                                    <span class="material-symbols-outlined text-sm">edit_note</span>
                                    <span class="text-xs font-bold uppercase tracking-wider">編輯規則內容</span>
                                </div>
                                <div class="w-10 h-10 bg-primary/10 text-primary rounded-xl flex items-center justify-center">
                                    <span class="material-symbols-outlined text-2xl" x-text="rule.icon"></span>
                                </div>
                            </div>
                            
                            <!-- 圖示選擇器 -->
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold text-outline ml-1">選擇圖示</label>
                                <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar px-1">
                                    <template x-for="iconName in iconLibrary" :key="iconName">
                                        <button 
                                            @click="rule.icon = iconName"
                                            class="flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center transition-all border-2"
                                            :class="rule.icon === iconName ? 'bg-primary text-on-primary border-primary' : 'bg-surface-container text-outline border-transparent'"
                                        >
                                            <span class="material-symbols-outlined text-xl" x-text="iconName"></span>
                                        </button>
                                    </template>
                                </div>
                            </div>

                            <!-- 名稱輸入 -->
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-outline ml-1">規則名稱</label>
                                <input 
                                    class="w-full bg-surface-container border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary font-medium" 
                                    placeholder="請輸入規則名稱" 
                                    type="text" 
                                    x-model="rule.name"
                                />
                            </div>
                            
                            <!-- 三欄輸入區 -->
                            <div class="grid grid-cols-12 gap-3">
                                <div class="col-span-4 space-y-1">
                                    <label class="text-[10px] font-bold text-outline ml-1">積分變動</label>
                                    <input class="w-full bg-surface-container border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary font-mono text-center" placeholder="+50" type="text" x-model="rule.points"/>
                                </div>
                                <div class="col-span-3 space-y-1">
                                    <label class="text-[10px] font-bold text-outline ml-1">台數</label>
                                    <input class="w-full bg-surface-container border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary font-mono text-center" placeholder="1" type="text" x-model="rule.units"/>
                                </div>
                                <div class="col-span-5 space-y-1">
                                    <label class="text-[10px] font-bold text-outline ml-1">描述標籤</label>
                                    <input class="w-full bg-surface-container border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary" placeholder="如: 史詩級" type="text" x-model="rule.desc"/>
                                </div>
                            </div>

                            <div class="flex gap-3 justify-end pt-2">
                                <button @click="rule.editing = false" class="px-5 py-2 text-outline font-bold text-sm hover:bg-surface-container rounded-full transition-colors bouncy-press">取消</button>
                                <button @click="rule.editing = false" class="px-8 py-2 bg-primary text-on-primary font-bold text-sm rounded-full shadow-md hover:brightness-110 transition-all bouncy-press">儲存規則</button>
                            </div>
                        </div>
                    </div>
                </template>

                <button 
                    @click="addRule()"
                    class="w-full mt-4 py-5 border-2 border-dashed border-primary-container/40 rounded-2xl flex items-center justify-center gap-2 text-primary font-bold hover:bg-primary/5 transition-all bouncy-press"
                >
                    <span class="material-symbols-outlined">add_circle</span>
                    <span>新增一條<span x-text="activeTab === 'fortune' ? '仙緣' : '渡劫'"></span>規則</span>
                </button>
            </div>
        </div>
    </main>

    <div 
        class="fixed inset-0 z-[100] flex items-center justify-center p-6 modal-backdrop"
        style="background-color: rgba(31, 27, 21, 0.4); backdrop-filter: blur(4px);"
        x-show="showDeleteModal"
        x-cloak
        x-transition:enter="transition opacity-300"
        x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100"
        x-transition:leave="transition opacity-200"
        x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
    >
        <div 
            class="bg-white w-full max-w-[340px] rounded-[2.5rem] p-8 soft-shadow animate-pop"
            @click.away="showDeleteModal = false"
        >
            <div class="text-center">
                <div class="w-16 h-16 bg-error-container text-error rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-sm">
                    <span class="material-symbols-outlined text-[32px]">delete_forever</span>
                </div>
                <h3 class="text-xl font-bold text-on-surface mb-3">移除此規則？</h3>
                <p class="text-on-surface-variant text-sm leading-relaxed mb-8">
                    此動作無法復原。這條規則將從目前的仙班紀錄邏輯中徹底消失。
                </p>
                <div class="space-y-3">
                    <button 
                        @click="executeDelete()" 
                        class="w-full py-4 bg-error text-on-primary rounded-full font-bold shadow-lg shadow-error/20 bouncy-press"
                    >
                        確認移除
                    </button>
                    <button 
                        @click="showDeleteModal = false" 
                        class="w-full py-4 text-outline font-bold rounded-full hover:bg-surface-container transition-colors bouncy-press"
                    >
                        我再想想
                    </button>
                </div>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full z-50 flex justify-around items-center px-4 pb-8 h-24 max-w-[600px] bg-white shadow-[0_-4px_30px_rgba(0,0,0,0.05)] rounded-t-[2.5rem] gap-2">
        <div class="flex flex-1 flex-col items-center justify-center bg-primary-container/20 text-primary rounded-2xl px-4 py-3 transition-all cursor-default shadow-sm border border-primary-container/30">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">dashboard</span>
            <span class="text-[10px] mt-1 font-bold tracking-wider">大廳</span>
        </div>
        <div class="flex flex-1 flex-col items-center justify-center text-outline/60 px-4 py-3 cursor-not-allowed">
            <span class="material-symbols-outlined">edit_note</span>
            <span class="text-[10px] mt-1 font-bold tracking-wider">登記紀錄</span>
        </div>
        <div class="flex flex-1 flex-col items-center justify-center text-outline/60 px-4 py-3 cursor-not-allowed">
            <span class="material-symbols-outlined">leaderboard</span>
            <span class="text-[10px] mt-1 font-bold tracking-wider">個人數據</span>
        </div>
    </nav>

</body>
</html>
