    <div id="error-box" class="hidden flex items-center gap-xs text-error mt-sm animate-shake">
        <span class="material-symbols-outlined text-error">error</span>
        <span class="text-sm">存取密鑰錯誤</span>
    </div>
    <button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>

        <span class="material-symbols-outlined">verified_user</span>

    <span class="material-symbols-outlined" data-icon="home">home</span>
    返回大廳
</a>

<script>
    function checkPassword() {
        const input = document.getElementById("password").value;
        const errorBox = document.getElementById("error-box");
    
        // 🔐 你的密碼（之後可以改）
        const correctPassword = "9999";
    
        if (input === correctPassword) {
            // 成功 → 跳轉
            window.location.href = "setup.html";
        } else {
            // 失敗 → 顯示錯誤 + 抖動
            errorBox.classList.remove("hidden");
    
            errorBox.classList.remove("animate-shake");
            void errorBox.offsetWidth; // 重播動畫
            errorBox.classList.add("animate-shake");
        }
    }
    </script>
